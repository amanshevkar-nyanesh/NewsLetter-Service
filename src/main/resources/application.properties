# Server Configuration
server.port=${PORT:8080}

# Application Name
spring.application.name=newsletter-service

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
# Disable mail health check if email is not configured (prevents startup errors)
management.health.mail.enabled=false

# Database Configuration
# Uses H2 for local development, PostgreSQL for production (Render)

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:newsletterdb}
# Let Spring Boot auto-detect driver from URL (postgresql:// or jdbc:h2:)
spring.datasource.driver-class-name=
# These are only used if DATABASE_URL is not set (H2 fallback)
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Auto-detect dialect from datasource URL (PostgreSQL or H2)
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:}
spring.jpa.properties.hibernate.format_sql=true
# H2 Console (disabled by default for security, enable locally if needed)
# Set H2_CONSOLE_ENABLED=true in local environment to enable
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Email Configuration (SMTP)
# Using Gmail SMTP as example - can be configured for any SMTP service
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Increased timeouts for Render deployment (network latency)
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000
# Additional connection properties for better reliability
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false

# Application Configuration
app.email.from-name=${EMAIL_FROM_NAME:Newsletter Service}

